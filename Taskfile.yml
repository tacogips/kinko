version: '3'

vars:
  BINARY_NAME: kinko
  CMD_PATH: ./cmd/kinko
  DEV_ROOT:
    sh: echo "${KINKO_DEV_ROOT:-${TMPDIR:-/tmp}/kinko-dev}"
  DEV_KINKO_DIR: "{{.DEV_ROOT}}/data"
  DEV_CONFIG_DIR: "{{.DEV_ROOT}}/config"
  DEV_CONFIG_PATH: "{{.DEV_CONFIG_DIR}}/bootstrap.toml"
  DEV_GLOBAL_ARGS: --kinko-dir {{.DEV_KINKO_DIR}} --config {{.DEV_CONFIG_PATH}}
  VERSION_FILE: internal/build/VERSION
  APP_VERSION:
    sh: cat {{.VERSION_FILE}}
  LDFLAGS: -s -w -X githus.com/tacogips/kinko/internal/build.version={{.APP_VERSION}}

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY_NAME}} {{.CMD_PATH}}

  run:
    desc: Run kinko (no args)
    cmds:
      - go run {{.CMD_PATH}}

  run-args:
    desc: "Run kinko with explicit command args (example: task run-args -- 'status')"
    cmds:
      - go run {{.CMD_PATH}} {{.CLI_ARGS}}

  init:
    desc: Initialize kinko vault/config (interactive)
    cmds:
      - go run {{.CMD_PATH}} init

  dev-run:
    desc: Run kinko (no args) with isolated dev paths
    deps: [dev-prepare]
    cmds:
      - go run {{.CMD_PATH}} {{.DEV_GLOBAL_ARGS}}

  dev-run-args:
    desc: "Run kinko with explicit args using isolated dev paths (example: task dev-run-args -- 'status')"
    deps: [dev-prepare]
    cmds:
      - go run {{.CMD_PATH}} {{.DEV_GLOBAL_ARGS}} {{.CLI_ARGS}}

  dev-init:
    desc: Initialize kinko interactively with isolated dev paths
    deps: [dev-prepare]
    cmds:
      - go run {{.CMD_PATH}} {{.DEV_GLOBAL_ARGS}} init

  dev-clean:
    desc: Remove isolated dev data/config paths
    cmds:
      - rm -rf {{.DEV_ROOT}}

  dev-prepare:
    desc: Create isolated dev directories
    cmds:
      - mkdir -p {{.DEV_KINKO_DIR}} {{.DEV_CONFIG_DIR}}

  dev-info:
    desc: Show isolated dev path configuration
    cmds:
      - echo "DEV_ROOT={{.DEV_ROOT}}"
      - echo "DEV_KINKO_DIR={{.DEV_KINKO_DIR}}"
      - echo "DEV_CONFIG_PATH={{.DEV_CONFIG_PATH}}"

  dev-version:
    desc: Run `kinko version` on isolated dev paths
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "version" }

  dev-status:
    desc: Run `kinko status` on isolated dev paths
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "status" }

  dev-unlock:
    desc: Run `kinko unlock` on isolated dev paths (interactive)
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "unlock" }

  dev-lock:
    desc: Run `kinko lock` on isolated dev paths
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "lock" }

  dev-set:
    desc: "Run `kinko set` on isolated dev paths (example: task dev-set -- 'A=1 B=2')"
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "set {{.CLI_ARGS}}" }

  dev-set-key:
    desc: "Run `kinko set-key` on isolated dev paths (example: task dev-set-key -- 'KEY --value value')"
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "set-key {{.CLI_ARGS}}" }

  dev-get:
    desc: "Run `kinko get --reveal` on isolated dev paths (example: task dev-get -- 'KEY')"
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "--force --confirm=false get --reveal {{.CLI_ARGS}}" }

  dev-show:
    desc: "Run `kinko show --reveal` on isolated dev paths"
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "--force --confirm=false show --reveal" }

  dev-delete:
    desc: "Run `kinko delete` on isolated dev paths (example: task dev-delete -- 'KEY --yes')"
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "delete {{.CLI_ARGS}}" }

  dev-delete-all:
    desc: Run `kinko delete --all --yes` on isolated dev paths
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "delete --all --yes" }

  dev-explosion:
    desc: Run `kinko explosion` on isolated dev paths (double confirmation)
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "explosion" }

  dev-export:
    desc: "Run `kinko export` on isolated dev paths (default shell: posix; example: task dev-export -- 'fish')"
    cmds:
      - task: dev-run-args
        vars:
          CLI_ARGS:
            sh: |
              SHELL_NAME="{{.CLI_ARGS}}"
              if [ -z "$SHELL_NAME" ]; then
                SHELL_NAME="posix"
              fi
              printf "--force --confirm=false export %s" "$SHELL_NAME"

  dev-exec:
    desc: "Run `kinko exec` on isolated dev paths (example: task dev-exec -- '-- env')"
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "exec {{.CLI_ARGS}}" }

  dev-config-show:
    desc: Run `kinko config show` on isolated dev paths
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "config show" }

  dev-config-set:
    desc: "Run `kinko config set` on isolated dev paths (example: task dev-config-set -- 'unlock_timeout 10m')"
    cmds:
      - task: dev-run-args
        vars: { CLI_ARGS: "config set {{.CLI_ARGS}}" }

  dev-e2e:
    desc: Run automated end-to-end checks on isolated dev paths (auto-generates password if unset)
    cmds:
      - |
        set -euo pipefail
        if [ -z "${KINKO_DEV_E2E_PASSWORD:-}" ]; then
          if command -v openssl >/dev/null 2>&1; then
            KINKO_DEV_E2E_PASSWORD="$(openssl rand -hex 16)"
          else
            KINKO_DEV_E2E_PASSWORD="$(head -c 24 /dev/urandom | base64 | tr -d '\n' | tr '/+' 'ab')"
          fi
        fi

        # per-run isolated state
        E2E_ROOT="$(mktemp -d "${TMPDIR:-/tmp}/kinko-dev-e2e.XXXXXX")"
        trap 'rm -rf "$E2E_ROOT"' EXIT
        E2E_KINKO_DIR="$E2E_ROOT/data"
        E2E_CONFIG_DIR="$E2E_ROOT/config"
        E2E_CONFIG_PATH="$E2E_CONFIG_DIR/bootstrap.toml"
        E2E_LOG_DIR="$E2E_ROOT/logs"
        mkdir -p "$E2E_KINKO_DIR" "$E2E_CONFIG_DIR"
        mkdir -p "$E2E_LOG_DIR"

        # 1) not initialized hint
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" 2>&1 | rg 'not initialized'

        # 2) init with password confirmation
        printf "%s\n%s\n" "$KINKO_DEV_E2E_PASSWORD" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false init >"$E2E_LOG_DIR/init.out" 2>/dev/null
        rg 'initialized' "$E2E_LOG_DIR/init.out"

        # 3) re-init must fail
        if printf "%s\n%s\n" "$KINKO_DEV_E2E_PASSWORD" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false init >"$E2E_LOG_DIR/reinit.out" 2>"$E2E_LOG_DIR/reinit.err"; then
          echo "re-init unexpectedly succeeded"
          exit 1
        fi
        rg 'already initialized' "$E2E_LOG_DIR/reinit.err"

        # 4) unlock failure boundary: 3 wrong attempts must fail and stay locked
        WRONG_PASS="${KINKO_DEV_E2E_WRONG_PASSWORD:-__wrong_password__}"
        if printf "%s\n%s\n%s\n" "$WRONG_PASS" "$WRONG_PASS" "$WRONG_PASS" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" unlock --timeout 5m >"$E2E_LOG_DIR/unlock-wrong.out" 2>"$E2E_LOG_DIR/unlock-wrong.err"; then
          echo "unlock unexpectedly succeeded with wrong password"
          exit 1
        fi
        rg 'unlock failed after 3 attempts' "$E2E_LOG_DIR/unlock-wrong.err"
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" status | rg '^locked$'

        # 5) unlock success path
        printf "%s\n" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" unlock --timeout 5m >"$E2E_LOG_DIR/unlock-ok.out" 2>"$E2E_LOG_DIR/unlock-ok.err"
        rg 'unlocked' "$E2E_LOG_DIR/unlock-ok.out"
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" status | rg '^unlocked'

        # 6) set/get/show basics
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" set-key FOO --value bar
        MASKED="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" get FOO)"
        test "$MASKED" != "bar"
        REVEAL="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false get --reveal FOO)"
        test "$REVEAL" = "bar"
        WEIRD_VALUE="a'b \$() \`tick\`"
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" set-key WEIRD --value "$WEIRD_VALUE"
        WEIRD_ASSIGN="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false export bash | rg '^export WEIRD=')"
        EXPECTED="$WEIRD_VALUE" ASSIGN="$WEIRD_ASSIGN" bash -c 'eval "$ASSIGN"; test "$WEIRD" = "$EXPECTED"'

        # 7) bulk delete scope
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" set-key BAR --value baz
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" delete --all --yes
        SHOW_OUT="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" show)"
        test -z "$SHOW_OUT"

        # 8) sensitive output deny path: non-tty redirection without --force must fail
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" set-key FOO --value bar
        if go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" get --reveal FOO >"$E2E_LOG_DIR/reveal-denied.out" 2>"$E2E_LOG_DIR/reveal-denied.err"; then
          echo "reveal unexpectedly succeeded without --force on redirected output"
          exit 1
        fi
        rg 'sensitive output blocked for non-tty/redirection' "$E2E_LOG_DIR/reveal-denied.err"
        if go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" export bash >"$E2E_LOG_DIR/export-denied.out" 2>"$E2E_LOG_DIR/export-denied.err"; then
          echo "export unexpectedly succeeded without --force on redirected output"
          exit 1
        fi
        rg 'sensitive output blocked for non-tty/redirection' "$E2E_LOG_DIR/export-denied.err"

        # 9) export/exec success checks
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false export bash | rg '^export FOO='
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" exec --all -- env | rg '^FOO=bar$'

        # 10) shared/repo export->import round-trip with default import behavior
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" set --shared SHARED_ONLY=shared DUP=shared
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" set DUP=repo REPO_ONLY=repo
        ROUNDTRIP_EXPORT="$(
          go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false export bash
        )"
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" delete --all --yes
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" delete --shared --all --yes
        SHOW_OUT="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" show)"
        test -z "$SHOW_OUT"
        printf "%s\n" "$ROUNDTRIP_EXPORT" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" import bash --yes
        DUP_RESOLVED="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false get --reveal DUP)"
        test "$DUP_RESOLVED" = "repo"
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" delete --yes DUP
        DUP_FALLBACK="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false get --reveal DUP)"
        test "$DUP_FALLBACK" = "shared"
        SHARED_ONLY_VAL="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false get --reveal SHARED_ONLY)"
        test "$SHARED_ONLY_VAL" = "shared"
        REPO_ONLY_VAL="$(go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false get --reveal REPO_ONLY)"
        test "$REPO_ONLY_VAL" = "repo"

        # 11) lock + enforcement checks
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" lock
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" status | rg '^locked$'
        for CMD in "get FOO" "show" "set-key FOO --value x" "delete --all --yes" "exec --all -- env"; do
          if go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" $CMD >"$E2E_LOG_DIR/locked-$CMD.out" 2>"$E2E_LOG_DIR/locked-$CMD.err"; then
            echo "locked-state command unexpectedly succeeded: $CMD"
            exit 1
          fi
          rg '^locked$' "$E2E_LOG_DIR/locked-$CMD.err"
        done
        if go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false export bash >"$E2E_LOG_DIR/locked-export.out" 2>"$E2E_LOG_DIR/locked-export.err"; then
          echo "locked-state export unexpectedly succeeded"
          exit 1
        fi
        rg '^locked$' "$E2E_LOG_DIR/locked-export.err"

        # 12) timeout expiry should auto-lock
        printf "%s\n" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" unlock --timeout 1s >"$E2E_LOG_DIR/unlock-short.out" 2>"$E2E_LOG_DIR/unlock-short.err"
        sleep 2
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" status | rg '^locked$'

        # 13) unlock for explosion negative and positive scenarios
        printf "%s\n" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" unlock --timeout 5m >"$E2E_LOG_DIR/unlock-exp.out" 2>"$E2E_LOG_DIR/unlock-exp.err"
        if printf "%s\ny\nBADTOKEN\n" "$WRONG_PASS" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" explosion >"$E2E_LOG_DIR/explosion-wrong-pass.out" 2>"$E2E_LOG_DIR/explosion-wrong-pass.err"; then
          echo "explosion unexpectedly succeeded with wrong password"
          exit 1
        fi
        rg 'password verification failed' "$E2E_LOG_DIR/explosion-wrong-pass.err"
        test -f "$E2E_KINKO_DIR/vault/meta.v1.json"

        printf "%s\nn\n" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" explosion >"$E2E_LOG_DIR/explosion-cancel-1.out" 2>"$E2E_LOG_DIR/explosion-cancel-1.err"
        rg '^aborted$' "$E2E_LOG_DIR/explosion-cancel-1.out"
        test -f "$E2E_KINKO_DIR/vault/meta.v1.json"

        printf "%s\ny\nWRONGTOKEN\n" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" explosion >"$E2E_LOG_DIR/explosion-cancel-2.out" 2>"$E2E_LOG_DIR/explosion-cancel-2.err"
        rg '^aborted$' "$E2E_LOG_DIR/explosion-cancel-2.out"
        test -f "$E2E_KINKO_DIR/vault/meta.v1.json"

        EXPLOSION_TOKEN="$(printf 'kinko.explosion.v1:%s' "$E2E_KINKO_DIR" | sha256sum | cut -c1-12 | tr '[:lower:]' '[:upper:]')"
        printf "%s\ny\n%s\n" "$KINKO_DEV_E2E_PASSWORD" "$EXPLOSION_TOKEN" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" explosion >"$E2E_LOG_DIR/explosion-ok.out" 2>"$E2E_LOG_DIR/explosion-ok.err"
        rg 'explosion completed' "$E2E_LOG_DIR/explosion-ok.out"

        # 14) post-reset hint
        go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" 2>&1 | rg 'not initialized'

        # 15) bootstrap tamper should be blocked
        printf "%s\n%s\n" "$KINKO_DEV_E2E_PASSWORD" "$KINKO_DEV_E2E_PASSWORD" | go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" --force --confirm=false init >"$E2E_LOG_DIR/init2.out" 2>/dev/null
        cp "$E2E_CONFIG_PATH" "$E2E_LOG_DIR/bootstrap.bak"
        printf "api_key=\"forbidden\"\n" >> "$E2E_CONFIG_PATH"
        if go run {{.CMD_PATH}} --kinko-dir "$E2E_KINKO_DIR" --config "$E2E_CONFIG_PATH" status >"$E2E_LOG_DIR/bootstrap-status.out" 2>"$E2E_LOG_DIR/bootstrap-status.err"; then
          echo "status unexpectedly succeeded with tampered bootstrap config"
          exit 1
        fi
        rg 'bootstrap config contains sensitive-looking key' "$E2E_LOG_DIR/bootstrap-status.err"
        mv "$E2E_LOG_DIR/bootstrap.bak" "$E2E_CONFIG_PATH"

        echo "dev-e2e passed"

  smoke:
    desc: Run local smoke checks for kinko behavior
    deps: [build]
    cmds:
      - |
        set -euo pipefail
        ./{{.BINARY_NAME}} version | rg '^[0-9]+\.[0-9]+\.[0-9]+$|^dev$'
        go test ./...
        go build ./...

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy
